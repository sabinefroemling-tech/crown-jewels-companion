<style>
/* Lokale Schriften — kein Abruf bei Google Fonts (vgl. LG München I, 3 O 17493/20) · SIL OFL 1.1 */
@font-face{font-family:'Fraunces';src:url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2-variations'),url('fonts/fraunces-latin-opsz-normal.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap;}
@font-face{font-family:'JetBrains Mono';src:url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2-variations'),url('fonts/jetbrains-mono-latin-wght-normal.woff2') format('woff2');font-weight:100 800;font-style:normal;font-display:swap;}
:root{--red:#2240c4;--red-soft:#dfe4fa;--ink:#181840;--paper:#f5f6fb;--line:#d8dcef;--muted:#5d6184;
--krit:#d6246e;--hoch:#7a3fd1;--mittel:#b97e0a;--niedrig:#1d8a5f;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;background:var(--paper);color:var(--ink);line-height:1.5;
background-image:radial-gradient(var(--line) .5px,transparent .5px);background-size:22px 22px;}
.wrap{max-width:1280px;margin:0 auto;padding:38px 20px 80px;}
header{border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:18px;}
.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--red);font-weight:600;}
h1{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(24px,4.2vw,40px);line-height:1.05;margin:8px 0 10px;}
.sub{font-size:13px;color:var(--muted);max-width:840px;}
.sig{color:var(--red);font-weight:600;}
.ref{font-size:11px;color:var(--muted);font-style:italic;margin-top:6px;}
h2{font-family:'Fraunces',serif;font-size:20px;margin:26px 0 6px;}
.note{font-size:12px;color:var(--muted);margin-bottom:10px;}
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;}
th,td{border:1px solid var(--line);padding:7px 8px;text-align:center;vertical-align:middle;}
th{background:var(--red);color:#fff;font-weight:600;font-size:10.5px;}
th.crit{font-size:10px;}
td.name{text-align:left;font-weight:600;min-width:150px;}
td.name input{width:100%;border:0;font-family:inherit;font-size:12px;font-weight:600;background:transparent;color:var(--ink);}
td.txt input{width:100%;border:0;font-family:inherit;font-size:11px;background:transparent;color:var(--ink);}
input:focus,select:focus{outline:1px solid var(--red);}
select{font-family:inherit;font-size:12px;border:1px solid var(--line);background:var(--paper);padding:3px;width:48px;cursor:pointer;}
select.crit4{border-color:var(--red);font-weight:600;}
.flagcell{font-weight:600;color:#fff;font-size:10.5px;letter-spacing:.4px;}
.cnt{font-size:10px;color:var(--muted);}
.del{color:var(--muted);cursor:pointer;border:0;background:none;font-family:inherit;font-size:14px;}
.del:hover{color:var(--red);}
.btn{font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
padding:10px 15px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;transition:.15s;}
.btn.ghost{background:transparent;color:var(--ink);} .btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
.addbtn{font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:7px 13px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;margin-top:10px;}
.addbtn:hover{background:var(--ink);color:#fff;}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:24px 0 0;}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin:18px 0;}
@media(max-width:700px){.summary{grid-template-columns:repeat(2,1fr)}}
.scard{border:1px solid var(--ink);background:#fff;padding:13px;}
.scard .num{font-family:'Fraunces',serif;font-size:28px;font-weight:800;}
.scard .lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.scard.cj{border-color:var(--red);} .scard.cj .num{color:var(--red);}
.legend{font-size:11px;color:var(--muted);margin:8px 0;}
.pill{display:inline-block;padding:1px 7px;font-weight:600;color:#fff;margin-right:3px;font-size:10px;}
.warn{background:#fff7e6;border:1px solid var(--mittel);color:#7a5306;font-size:11.5px;padding:9px 12px;margin:10px 0;}
details{margin:12px 0;background:#fff;border:1px solid var(--line);padding:10px 14px;}
summary{cursor:pointer;font-weight:600;font-size:12px;}
details p,details li{font-size:11.5px;color:var(--muted);margin-top:6px;}
details ul{margin-left:18px;}
footer{margin-top:34px;border-top:1px solid var(--line);padding-top:15px;font-size:11px;color:var(--muted);line-height:1.7;}
@media print{body{background:none}.toolbar,.addbtn,.del{display:none!important}}
.langsw{position:absolute;top:0;right:0;display:flex;border:1px solid var(--ink);}
.langsw button{font-family:inherit;font-size:11px;font-weight:600;padding:5px 11px;border:0;background:transparent;color:var(--ink);cursor:pointer;letter-spacing:1px;}
.langsw button.on{background:var(--ink);color:#fff;}
@media print{.langsw{display:none}}

/* ================= Reihen-Design v2 (Buchcover) ================= */
header.sf-cover{position:relative;overflow:hidden;background:#0a0a33;border-bottom:0;padding:0;margin:0;}
.sf-cover svg.plx{position:absolute;inset:0;width:100%;height:100%;}
.sf-cover-in{position:relative;max-width:1180px;margin:0 auto;padding:46px 20px 34px;}
.sf-cover .kicker{color:#41cdf4;}
.sf-cover h1{color:#fff;text-shadow:0 1px 14px rgba(6,6,31,.55);}
.sf-cover .sub{color:#ccd1f2;}
.sf-cover .sig{color:#ff5fa8;}
.sf-cover .ref{color:#9aa0d6;}
.sf-cover .langsw{position:absolute;top:18px;right:20px;border:1px solid rgba(232,234,255,.45);}
.sf-cover .langsw button{color:#e8eaff;}
.sf-cover .langsw button.on{background:#e8eaff;color:#10104a;}
.sf-rule{height:4px;background:linear-gradient(90deg,#d6246e,#7a5cff 35%,#41cdf4 72%,#2fe39b);}
.wrap{padding-top:26px;}
.sf-glance{background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);padding:16px 18px 8px;margin:6px 0 20px;}
.sf-glh{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);font-weight:600;margin-bottom:8px;}
.sf-glg{display:grid;grid-template-columns:1fr;margin:0;}
.sf-glg>div{display:grid;grid-template-columns:92px 1fr;gap:12px;padding:7px 0;border-top:1px dashed var(--line);}
.sf-glg>div:first-child{border-top:0;}
.sf-glg dt{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600;padding-top:2px;}
.sf-glg dd{font-size:12.5px;margin:0;line-height:1.55;}
.sf-legal{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;font-size:10.5px;color:var(--muted);line-height:1.65;max-width:980px;}
.sf-legal a{color:var(--muted);}
.sf-footband{position:relative;overflow:hidden;background:#0a0a33;margin-top:42px;}
.sf-footband svg.plx{position:absolute;inset:0;width:100%;height:100%;opacity:.9;}
.sf-foot-in{position:relative;max-width:1180px;margin:0 auto;padding:26px 20px 30px;}
.sf-foot-in footer{margin:0;border:0;padding:0;font-size:11px;color:#c7cbee;line-height:1.7;}
.sf-foot-in footer b{color:#fff;}
.sf-foot-in footer a{color:#9fd9f6;}
.sf-colo{margin-top:14px;padding-top:12px;border-top:1px solid rgba(199,203,238,.28);font-size:10.5px;color:#9aa0d6;line-height:1.9;}
.sf-colo a{color:#c7cbee;}
.sf-printhead{display:none;}
@keyframes sfPulse{0%,100%{opacity:.55}50%{opacity:1}}
.plx .ndp{animation:sfPulse 5s ease-in-out infinite;}
@media (prefers-reduced-motion:reduce){.plx .ndp{animation:none;}}
:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
@media print{
 .noprint,header.sf-cover,.sf-rule,.sf-glance,.sf-legal,.sf-footband{display:none!important}
 .sf-printhead{display:block;text-align:center;font-size:10px;color:#000;margin-bottom:6px;}
}
@media (max-width:620px){
 .sf-cover-in{padding:40px 16px 26px;}
 .sf-glg>div{grid-template-columns:1fr;gap:2px;}
 .sf-cover .langsw{top:12px;right:12px;}
}
</style>
</head>

let lang="de";
const L=()=>TXT[lang];

/* Typ: kanonisch DE gespeichert (Kompatibilität zum No-Touch-Import), Anzeige übersetzt */
const TYP=["SPS","SCADA","HMI","Schutzrelais","Historian","Engineering-WS","Netzwerk","Datenbank","Sonstiges"];
const TYP_EN={"SPS":"PLC","Schutzrelais":"Protective relay","Netzwerk":"Network","Datenbank":"Database","Sonstiges":"Other"};
const typLabel=t=>lang==="en"?(TYP_EN[t]||t):t;

const CRIT=["phys","econ","reg","dep","rto"];
let assets=[];
function defAsset(n){return {id:uid(),name:n||L().newAsset,phys:1,econ:1,reg:1,dep:1,rto:1,typ:"SPS",owner:"",rtoVal:"",rpoVal:"",komp:""};}
function uid(){return crypto.randomUUID();}

function count4(a){return CRIT.reduce((n,k)=>n+(a[k]===4?1:0),0);}
function sum(a){return CRIT.reduce((s,k)=>s+a[k],0);}
function classify(a){
  const c4=count4(a),T=L().cls;
  if(c4>=2)return{label:T.cj,color:"var(--krit)",rank:4,cj:true};
  if(c4===1)return{label:T.hoch,color:"var(--hoch)",rank:3,cj:false};
  if(sum(a)>=12)return{label:T.mittel,color:"var(--mittel)",rank:2,cj:false};
  return{label:T.niedrig,color:"var(--niedrig)",rank:1,cj:false};
}
function critLabel(a){const c4=count4(a),T=L().krit;
  if(c4>=2)return T.kritisch; if(c4===1||sum(a)>=14)return T.hoch; return T.mittel;}
function crit4Reasons(a){return CRIT.filter(k=>a[k]===4).map(k=>L().critname[k]).join(", ");}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ================= statisches i18n ================= */
function applyLang(){
  document.documentElement.lang=lang;
  document.title=L().title;
  document.querySelectorAll("[data-t]").forEach(el=>el.innerHTML=L()[el.dataset.t]);
  document.getElementById("thead1").innerHTML=L().th1.map((h,i)=>`<th${i===0?' style="text-align:left"':(i>=1&&i<=5?' class="crit"':'')}>${h}</th>`).join("");
  document.getElementById("thead2").innerHTML=L().th2.map((h,i)=>`<th${[1,7,8].includes(i)?' style="text-align:left"':''}>${h}</th>`).join("");
  document.getElementById("legend").innerHTML=L().legend.map(([t,c])=>`<span class="pill" style="background:${c}">${t}</span>`).join("\n  ");
  document.getElementById("lde").classList.toggle("on",lang==="de");
  document.getElementById("len").classList.toggle("on",lang==="en");
}
function setLang(l){lang=l;try{const u=new URL(location);u.searchParams.set('lang',l);history.replaceState(null,'',u);}catch(e){}applyLang();render();}

/* ================= Rendering ================= */
function render(){
  const tb=document.getElementById('rows');tb.innerHTML='';
  assets.forEach((a,i)=>{
    const cl=classify(a),c4=count4(a);
    let c=`<td class="name"><input value="${esc(a.name)}" onchange="upd(${i},'name',this.value)"></td>`;
    CRIT.forEach(k=>{
      c+=`<td><select class="${a[k]===4?'crit4':''}" onchange="upd(${i},'${k}',+this.value)">`+
        [1,2,3,4].map(v=>`<option ${a[k]==v?'selected':''}>${v}</option>`).join('')+`</select></td>`;
    });
    c+=`<td class="cnt">${c4}×4</td>`;
    c+=`<td class="flagcell" style="background:${cl.color}">${cl.label}</td>`;
    c+=`<td><button class="del" onclick="del(${i})">✕</button></td>`;
    const tr=document.createElement('tr');tr.innerHTML=c;tb.appendChild(tr);
  });
  renderSummary();renderRegister();
}
function renderSummary(){
  const c={4:0,3:0,2:0,1:0};assets.forEach(a=>c[classify(a).rank]++);
  const S=L().sum;
  document.getElementById('summary').innerHTML=`
    <div class="scard cj"><div class="num">${c[4]}</div><div class="lbl">${S[0]}</div></div>
    <div class="scard"><div class="num">${c[3]}</div><div class="lbl">${S[1]}</div></div>
    <div class="scard"><div class="num">${c[2]}</div><div class="lbl">${S[2]}</div></div>
    <div class="scard"><div class="num">${assets.length}</div><div class="lbl">${S[3]}</div></div>`;
  const w=document.getElementById('overWarn');
  if(c[4]>5){w.innerHTML=`<div class="warn">${L().overwarn(c[4])}</div>`;}
  else w.innerHTML='';
}
function renderRegister(){
  const cjs=assets.filter(a=>classify(a).cj);
  const tb=document.getElementById('regRows');tb.innerHTML='';
  document.getElementById('regEmpty').textContent=cjs.length?'':L().regEmpty;
  cjs.forEach((a,i)=>{
    const idx=assets.indexOf(a);
    const id="CJ-"+String(i+1).padStart(3,'0');
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${id}</td>`+
      `<td class="name">${esc(a.name)}</td>`+
      `<td><select onchange="upd(${idx},'typ',this.value)" style="width:auto">`+TYP.map(t=>`<option value="${t}" ${a.typ===t?'selected':''}>${esc(typLabel(t))}</option>`).join('')+`</select></td>`+
      `<td class="txt"><input value="${esc(a.owner)}" placeholder="${L().phOwner}" onchange="upd(${idx},'owner',this.value)"></td>`+
      `<td class="txt"><input value="${esc(a.rtoVal)}" placeholder="${L().phRto}" style="width:60px" onchange="upd(${idx},'rtoVal',this.value)"></td>`+
      `<td class="txt"><input value="${esc(a.rpoVal)}" placeholder="${L().phRpo}" style="width:60px" onchange="upd(${idx},'rpoVal',this.value)"></td>`+
      `<td class="flagcell" style="background:var(--krit)">${critLabel(a)}</td>`+
      `<td class="txt" style="font-size:10.5px;color:var(--muted)">${L().fourIn} ${esc(crit4Reasons(a))}</td>`+
      `<td class="txt"><input value="${esc(a.komp)}" placeholder="${L().phKomp}" onchange="upd(${idx},'komp',this.value)"></td>`;
    tb.appendChild(tr);
  });
}
function upd(i,k,v){assets[i][k]=v;render();}
function del(i){assets.splice(i,1);render();}
function addAsset(){assets.push(defAsset(L().assetN(assets.length+1)));render();}

function saveJSON(){const blob=new Blob([JSON.stringify({assets},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='crown-jewels-buch.json';a.click();}
function loadJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d.assets){assets=d.assets;render();}}catch(err){alert(L().notRead);}};r.readAsText(f);e.target.value='';}
function exportCSV(){
  const rows=assets.map(a=>[a.name,a.phys,a.econ,a.reg,a.dep,a.rto,count4(a),classify(a).label,classify(a).cj?critLabel(a):"",typLabel(a.typ),a.owner,a.rtoVal,a.rpoVal,a.komp]);
  const csv=[L().csvHead,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\ufeff"+csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=L().csvName;a.click();
}
